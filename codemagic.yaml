workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      node: 18
      java: 17
      groups:
        - supa var
      vars:
        EXPO_NO_DOTENV: "1"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Run Expo prebuild (Android)
        script: npx expo prebuild --platform android --clean
      - name: Build Android AAB (Play Store)
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab

  ios-build:
    name: iOS Build → TestFlight
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: OnSite Calculator
    environment:
      node: 20
      xcode: 16.4
      cocoapods: default
      groups:
        - supa var
      vars:
        EXPO_NO_DOTENV: "1"
        BUNDLE_ID: "com.onsiteclub.timekeeper"
        SENTRY_DISABLE_AUTO_UPLOAD: "true"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.onsiteclub.timekeeper
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Run Expo prebuild (iOS)
        script: npx expo prebuild --platform ios --clean
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Set up code signing
        script: xcode-project use-profiles --project ios/OnSiteTimekeeper.xcodeproj
      - name: Verbose archive (diagnostic)
        script: |
          set -o pipefail
          mkdir -p /tmp/xcodebuild_logs
          xcodebuild \
            -workspace ios/OnSiteTimekeeper.xcworkspace \
            -scheme OnSiteTimekeeper \
            -configuration Release \
            -archivePath /tmp/xcodebuild_logs/diag.xcarchive \
            -destination "generic/platform=iOS" \
            -resultBundlePath /tmp/xcodebuild_logs/diag.xcresult \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=L3528THKT5 \
            "CODE_SIGN_IDENTITY=Apple Distribution" \
            CODE_SIGN_STYLE=Manual \
            2>&1 | tee /tmp/xcodebuild_logs/diag.log
          DIAG_EXIT=${PIPESTATUS[0]}
          echo "================================================================"
          echo "Verbose archive exited: $DIAG_EXIT"
          echo "Last 300 lines of diag.log (look for 'error:' above):"
          echo "================================================================"
          tail -n 300 /tmp/xcodebuild_logs/diag.log || true
          echo "================================================================"
        ignore_failure: true
      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/OnSiteTimekeeper.xcworkspace \
            --scheme OnSiteTimekeeper \
            --config Release \
            --archive-xcargs="SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD=NO SUPPORTS_MACCATALYST=NO"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - /tmp/xcodebuild_logs/**
      - $CM_BUILD_DIR/build/ios/**/*.log
      - $CM_BUILD_DIR/build/**/*.xcresult
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "Internal Testing"
